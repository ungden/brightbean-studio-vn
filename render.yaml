services:
  - type: web
    name: brightbean-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: brightbean-db
          property: connectionString
      - key: STORAGE_BACKEND
        value: s3

  - type: worker
    name: brightbean-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: python manage.py process_tasks
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        fromService:
          name: brightbean-web
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: brightbean-db
          property: connectionString

databases:
  - name: brightbean-db
    plan: starter

services:
  - type: web
    name: brightbean-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    preDeployCommand: "python manage.py migrate"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY_SALT
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: brightbean-db
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false
      - key: APP_URL
        sync: false
      - key: STORAGE_BACKEND
        value: s3

  - type: worker
    name: brightbean-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: python manage.py process_tasks
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        fromService:
          name: brightbean-web
          type: web
          envVarKey: SECRET_KEY
      - key: ENCRYPTION_KEY_SALT
        fromService:
          name: brightbean-web
          type: web
          envVarKey: ENCRYPTION_KEY_SALT
      - key: DATABASE_URL
        fromDatabase:
          name: brightbean-db
          property: connectionString
      - key: STORAGE_BACKEND
        value: s3

databases:
  - name: brightbean-db
    plan: free

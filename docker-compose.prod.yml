services:
  migrate:
    build: .
    command: python manage.py migrate --noinput
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/brightbean
    depends_on:
      postgres:
        condition: service_healthy

  app:
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 4
      --threads 2
      --timeout 120
      --access-logfile -
      --error-logfile -
    volumes:
      - media_data:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    volumes:
      - media_data:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  maintenance:
    build: .
    command: >
      sh -c "
      while true; do
        echo \"[maintenance] $$(date): Running clearsessions...\"
        python manage.py clearsessions
        echo \"[maintenance] $$(date): Running media cleanup...\"
        python manage.py cleanup_orphaned_media --once --min-age-days 14
        echo \"[maintenance] $$(date): Done. Sleeping 24h.\"
        sleep 86400
      done
      "
    volumes:
      - media_data:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:

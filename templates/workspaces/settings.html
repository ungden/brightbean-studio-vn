{% extends "layouts/workspace_settings.html" %}
{% block title %}Settings — {{ workspace.name }} — Brightbean{% endblock %}
{% block content %}
<div class="max-w-2xl">
    <h2 class="text-xl font-semibold mb-8" style="color: var(--text-primary);">General</h2>

    <!-- Workspace Name section -->
    <form method="POST" class="mb-10">
        {% csrf_token %}
        <div class="flex items-end gap-4">
            <div class="flex-1">
                <label for="name" class="block text-sm font-semibold mb-2" style="color: var(--text-primary);">Workspace Name</label>
                <input type="text" id="name" name="name" value="{{ workspace.name }}" required maxlength="100"
                       class="w-full px-3 py-2 text-sm rounded-lg outline-none transition-colors"
                       style="border: 1px solid var(--border); color: var(--text-primary); background: var(--surface-0);"
                       onfocus="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 0 0 3px var(--primary-ring)'"
                       onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none'">
            </div>
            <button type="submit"
                    class="px-5 py-2 text-sm font-medium rounded-full transition-colors cursor-pointer whitespace-nowrap"
                    style="background: var(--neutral-100); color: var(--text-primary);"
                    onmouseenter="this.style.background='var(--neutral-200)'"
                    onmouseleave="this.style.background='var(--neutral-100)'">
                Save Changes
            </button>
        </div>
    </form>

    <!-- Logo section -->
    <form method="POST" enctype="multipart/form-data" x-data="{
        preview: '{% if workspace.icon %}{{ workspace.icon.url }}{% endif %}',
        hasExisting: {{ workspace.icon|yesno:'true,false' }},
        fileName: ''
    }">
        {% csrf_token %}
        <input type="hidden" name="upload_icon" value="1">
        <input type="hidden" name="delete_icon" :value="(!preview && hasExisting) ? '1' : '0'">

        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-4">
                <!-- Logo preview or default placeholder -->
                <template x-if="preview">
                    <div class="relative">
                        <img :src="preview" alt="Workspace logo" class="w-16 h-16 rounded-lg object-cover border" style="border-color: var(--border);">
                        <button type="button"
                                @click="preview = ''; $refs.fileInput.value = ''; fileName = ''"
                                class="absolute -top-1 -right-1 w-5 h-5 rounded-full flex items-center justify-center cursor-pointer"
                                style="background: var(--neutral-200); color: var(--text-secondary);"
                                title="Remove logo">
                            <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                </template>
                <template x-if="!preview">
                    <div class="w-16 h-16 rounded-lg flex items-center justify-center" style="background: var(--neutral-200);">
                        <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--neutral-400);"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    </div>
                </template>

                <div>
                    <p class="text-sm font-semibold" style="color: var(--text-primary);">Logo</p>
                    <p class="text-xs mt-0.5" style="color: var(--text-tertiary);">JPEG, PNG, WebP, or GIF. Max 2 MB.</p>
                </div>
            </div>

            <label class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-full cursor-pointer transition-colors"
                   style="border: 1px solid var(--border); color: var(--text-primary); background: var(--surface-0);"
                   onmouseenter="this.style.background='var(--neutral-50)'"
                   onmouseleave="this.style.background='var(--surface-0)'">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload Logo
                <input type="file" name="icon" accept="image/jpeg,image/png,image/webp,image/gif" class="hidden" x-ref="fileInput"
                       @change="if ($el.files[0]) { preview = URL.createObjectURL($el.files[0]); fileName = $el.files[0].name; hasExisting = true; $el.closest('form').requestSubmit(); }">
            </label>
        </div>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% load static i18n %}

{% block title %}Password Changed — Brightbean{% endblock %}

{% block auth_content %}
<div class="w-full max-w-md px-4">
    <!-- Logo & Header -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl mb-4" style="background: var(--success-50);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--success-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold tracking-tight" style="color: var(--text-primary);">
            Password changed
        </h1>
        <p class="text-sm mt-1" style="color: var(--text-secondary);">
            Your password has been updated successfully
        </p>
    </div>

    <!-- Card -->
    <div class="auth-card text-center">
        <a href="{% url 'account_login' %}" class="btn-brand">
            Sign In
        </a>
    </div>
</div>
{% endblock %}

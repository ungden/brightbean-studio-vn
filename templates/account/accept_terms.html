{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accept Terms - Brightbean</title>
    <link rel="icon" href="{% static 'favicon/favicon.ico' %}" sizes="any">
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon/favicon.svg' %}">
    <link rel="icon" type="image/png" sizes="96x96" href="{% static 'favicon/favicon-96x96.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicon/apple-touch-icon.png' %}">
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
</head>
<body>
<main class="auth-bg min-h-screen flex items-center justify-center py-12 px-4" style="font-family: var(--font-body);">
    <div class="w-full max-w-md px-4">
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 mb-4">
                <img src="{% static 'img/brightbean-logo.webp' %}" alt="Brightbean logo" class="w-12 h-12 object-contain">
            </div>
            <h1 class="text-2xl font-bold tracking-tight" style="color: var(--text-primary);">
                Almost there
            </h1>
            <p class="text-sm mt-1" style="color: var(--text-secondary);">
                Please review and accept our terms to continue
            </p>
        </div>

        <!-- Card -->
        <div class="auth-card">
            {% if messages %}
            <div class="mb-5 space-y-2">
                {% for message in messages %}
                <div class="{% if message.tags == 'error' %}alert-error{% elif message.tags == 'success' %}alert-success{% else %}alert-info{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <p class="text-sm mb-6" style="color: var(--text-secondary); line-height: 1.6;">
                One quick step before you get started.
            </p>

            <form method="post">
                {% csrf_token %}

                <label for="id_agree" class="flex items-start gap-3 cursor-pointer mb-6 p-3 rounded-lg transition-colors" style="border: 1.5px solid var(--border);" onmouseover="this.style.background='var(--surface-1)'" onmouseout="this.style.background='transparent'">
                    <input type="checkbox"
                           name="agree"
                           id="id_agree"
                           class="w-4 h-4 rounded mt-0.5 flex-shrink-0 cursor-pointer accent-[var(--primary)]"
                           style="border-color: var(--border);">
                    <span class="text-sm" style="color: var(--text-primary); line-height: 1.5;">
                        I agree to the
                        <a href="https://brightbean.xyz/terms-of-service/" target="_blank" rel="noopener" class="font-semibold underline hover:no-underline" style="color: var(--primary);">Terms of Service</a>
                        and
                        <a href="https://brightbean.xyz/privacy-policy/" target="_blank" rel="noopener" class="font-semibold underline hover:no-underline" style="color: var(--primary);">Privacy Policy</a>
                    </span>
                </label>

                <button type="submit" class="btn-brand">Tiếp tục</button>
            </form>
        </div>

        <!-- Sign out link -->
        <p class="text-center text-sm mt-6" style="color: var(--text-secondary);">
            <a href="{% url 'accounts:logout' %}" class="font-semibold hover:underline" style="color: var(--primary);">Đăng xuất</a>
        </p>
    </div>
</main>
</body>
</html>

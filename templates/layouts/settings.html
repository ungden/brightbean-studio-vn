{% extends "base.html" %}
{% load i18n %}

{% block page_header %}{% endblock %}

{% block sidebar_nav %}
<!-- Settings sidebar replaces normal nav -->
<a href="{% if request.workspace %}{% url 'calendar:calendar' workspace_id=request.workspace.id %}{% else %}/{% endif %}" class="sidebar-nav-item mb-2">
    <svg class="flex-shrink-0" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    <span class="sidebar-nav-label">Cài đặt</span>
</a>

<div class="sidebar-section-label">Tài khoản</div>
<a href="{% url 'accounts:settings' %}" class="sidebar-nav-item mb-1 {% if settings_active == 'profile' %}active{% endif %}">
    <svg class="flex-shrink-0" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="sidebar-nav-label">Hồ sơ</span>
</a>
<a href="{% url 'accounts:settings' %}?tab=preferences" class="sidebar-nav-item mb-1 {% if settings_active == 'preferences' %}active{% endif %}">
    <svg class="flex-shrink-0" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
    <span class="sidebar-nav-label">Tùy chọn</span>
</a>

<div class="sidebar-section-label">Organization</div>
<a href="{% url 'organizations:settings' %}" class="sidebar-nav-item mb-1 {% if settings_active == 'general' %}active{% endif %}">
    <svg class="flex-shrink-0" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    <span class="sidebar-nav-label">Chung</span>
</a>
<a href="{% url 'organizations:workspaces' %}" class="sidebar-nav-item mb-1 {% if settings_active == 'workspaces' %}active{% endif %}">
    <svg class="flex-shrink-0" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span class="sidebar-nav-label">Workspaces</span>
</a>
<a href="{% url 'members:list' %}" class="sidebar-nav-item mb-1 {% if settings_active == 'members' %}active{% endif %}">
    <svg class="flex-shrink-0" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
    <span class="sidebar-nav-label">Team Members</span>
</a>
<a href="{% url 'organizations:cross_workspace_calendar' %}" class="sidebar-nav-item mb-1 {% if settings_active == 'calendars' %}active{% endif %}">
    <svg class="flex-shrink-0" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="sidebar-nav-label">All Calendars</span>
</a>
<a href="{% url 'media_library_org:shared_index' %}" class="sidebar-nav-item mb-1 {% if settings_active == 'media' %}active{% endif %}">
    <svg class="flex-shrink-0" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    <span class="sidebar-nav-label">Media Library</span>
</a>
{% endblock %}

{% block content %}
{% endblock %}

{% extends "base.html" %}
{% load i18n %}

{% block page_header %}{% endblock %}

{% block sidebar_nav %}
<!-- Workspace settings sidebar -->
<a href="{% url 'calendar:calendar' workspace_id=request.workspace.id %}" class="sidebar-nav-item mb-2">

    <span class="sidebar-nav-label">Workspace Settings</span>

<div class="sidebar-section-label">{{ request.workspace.name }}</div>

    <span class="sidebar-nav-label">Chung</span>
</a>
<a href="{% url 'social_accounts:list' workspace_id=request.workspace.id %}" class="sidebar-nav-item mb-1 {% if settings_active == 'social_accounts' %}active{% endif %}">
    <svg class="flex-shrink-0" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    <span class="sidebar-nav-label">Social Accounts</span>
</a>
<a href="{% url 'media_library:index' workspace_id=request.workspace.id %}" class="sidebar-nav-item mb-1 {% if settings_active == 'media' %}active{% endif %}">
    <svg class="flex-shrink-0" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    <span class="sidebar-nav-label">Media Library</span>
</a>
<a href="{% url 'workspaces:approvals_settings' workspace_id=request.workspace.id %}" class="sidebar-nav-item mb-1 {% if settings_active == 'approvals' %}active{% endif %}">
    <svg class="flex-shrink-0" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>

</a>
<a href="{% url 'client_portal_admin:client_list' workspace_id=request.workspace.id %}" class="sidebar-nav-item mb-1 {% if settings_active == 'clients' %}active{% endif %}">
    <svg class="flex-shrink-0" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>

{% block content %}
{% endblock %}

{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Expired</title>
    <link rel="icon" href="{% static 'favicon/favicon.ico' %}" sizes="any">
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
</head>
<body class="min-h-screen flex items-center justify-center px-4" style="background: var(--surface-1); font-family: var(--font-body);">
    <div class="w-full max-w-sm text-center">
        <div class="rounded-2xl border p-8" style="background: var(--surface-0); border-color: var(--border); box-shadow: var(--shadow-lg);">
            <!-- Icon -->
            <div class="w-14 h-14 mx-auto rounded-2xl flex items-center justify-center mb-5" style="background: var(--warning-50);">
                <svg class="w-7 h-7" style="color: var(--warning-500);" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>

            <h1 class="text-lg font-bold tracking-tight mb-2" style="color: var(--text-primary); font-family: var(--font-display);">
                This link has expired
            </h1>
            <p class="text-sm leading-relaxed mb-6" style="color: var(--text-secondary);">
                Magic links are valid for 30 days. Please contact your account manager to receive a new link.
            </p>

            <div class="rounded-xl p-4 mb-4" style="background: var(--surface-1); border: 1px solid var(--border);">
                <p class="text-[0.8125rem] font-medium" style="color: var(--text-primary);">Need a new link?</p>
                <p class="text-[0.75rem] mt-1" style="color: var(--text-tertiary);">
                    Ask your team to send you a fresh access link from the workspace settings.
                </p>
            </div>
        </div>
    </div>
</body>
</html>

{% load i18n %}
{% if pending_invites %}
<div style="background: var(--surface-0); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden;">
    <div class="px-6 py-4" style="border-bottom: 1px solid var(--border);">
        <h3 class="text-sm font-semibold" style="color: var(--text-primary);">Pending Invitations</h3>
    </div>
    <div id="client-invitations-list">
        {% for invite in pending_invites %}
        <div class="px-6 py-4 flex items-center gap-4" id="client-invite-{{ invite.id }}"
             style="border-bottom: 1px solid var(--border);">
            <!-- Email icon -->
            <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0"
                 style="background: var(--neutral-100); color: var(--text-tertiary);">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>

            <!-- Email & Info -->
            <div class="flex-1 min-w-0">
                <div class="text-sm font-medium truncate" style="color: var(--text-primary);">{{ invite.email }}</div>
                <div class="text-xs" style="color: var(--text-tertiary);">
                    Invited by {{ invite.invited_by.display_name }} · Expires {{ invite.expires_at|timesince }} from now
                </div>
            </div>

            <!-- Role Badge -->
            <div class="flex-shrink-0">
                <span class="text-xs font-medium px-2.5 py-1 rounded-full" style="background: #FEF3C7; color: #92400E;">Client</span>
            </div>

            <!-- Actions -->
            <div class="flex-shrink-0 flex items-center gap-2">
                <form hx-post="{% url 'members:resend_invite' invitation_id=invite.id %}"
                      hx-target="#client-invite-{{ invite.id }}"
                      hx-swap="outerHTML">
                    {% csrf_token %}
                    <button type="submit"
                            class="text-xs px-3 py-1.5 rounded-full font-medium cursor-pointer transition-colors"
                            style="border: 1px solid var(--border); color: var(--text-primary); background: var(--surface-0);"
                            onmouseenter="this.style.background='var(--neutral-50)'"
                            onmouseleave="this.style.background='var(--surface-0)'">
                        Resend
                    </button>
                </form>
                <form hx-post="{% url 'members:revoke_invite' invitation_id=invite.id %}"
                      hx-target="#client-invite-{{ invite.id }}"
                      hx-swap="delete"
                      hx-confirm="Revoke invitation to {{ invite.email }}?">
                    {% csrf_token %}
                    <button type="submit"
                            class="text-xs px-3 py-1.5 rounded-full font-medium cursor-pointer transition-colors"
                            style="color: #DC2626; background: transparent;"
                            onmouseenter="this.style.background='#FEF2F2'"
                            onmouseleave="this.style.background='transparent'">
                        Revoke
                    </button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}

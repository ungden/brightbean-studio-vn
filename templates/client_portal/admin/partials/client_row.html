{% load i18n %}
<div class="px-6 py-4 flex items-center gap-4" id="client-{{ client.membership.id }}"
     style="border-bottom: 1px solid var(--border);">
    <!-- Avatar -->
    <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 text-sm font-semibold"
         style="background: var(--neutral-200); color: var(--text-secondary);">
        {{ client.user.display_name|first|upper }}
    </div>

    <!-- Name & Email -->
    <div class="flex-1 min-w-0">
        <div class="text-sm font-medium truncate" style="color: var(--text-primary);">
            {{ client.user.display_name }}
        </div>
        <div class="text-xs truncate" style="color: var(--text-tertiary);">{{ client.user.email }}</div>
    </div>

    <!-- Portal Link Status -->
    <div class="flex-shrink-0">
        {% if client.token %}
        <span class="text-xs font-medium px-2.5 py-1 rounded-full" style="background: #DCFCE7; color: #166534;">
            Link active
        </span>
        {% else %}
        <span class="text-xs font-medium px-2.5 py-1 rounded-full" style="background: var(--neutral-100); color: var(--text-tertiary);">
            No link sent
        </span>
        {% endif %}
    </div>

    <!-- Actions -->
    <div class="flex-shrink-0 flex items-center gap-2">
        <!-- Send / Resend Portal Link -->
        <form hx-post="{% url 'client_portal_admin:send_magic_link' workspace_id=client.membership.workspace_id membership_id=client.membership.id %}"
              hx-target="#client-{{ client.membership.id }}"
              hx-swap="outerHTML">
            {% csrf_token %}
            <button type="submit"
                    class="text-xs px-3 py-1.5 rounded-full font-medium cursor-pointer transition-colors"
                    style="border: 1px solid var(--border); color: var(--text-primary); background: var(--surface-0);"
                    onmouseenter="this.style.background='var(--neutral-50)'"
                    onmouseleave="this.style.background='var(--surface-0)'">
                {% if client.token %}Resend Link{% else %}Send Portal Link{% endif %}
            </button>
        </form>

        <!-- Remove -->
        <form hx-post="{% url 'client_portal_admin:remove_client' workspace_id=client.membership.workspace_id membership_id=client.membership.id %}"
              hx-target="#client-{{ client.membership.id }}"
              hx-swap="delete"
              hx-confirm="Remove {{ client.user.display_name }} from this workspace? Their portal access will be revoked.">
            {% csrf_token %}
            <button type="submit"
                    class="text-xs px-3 py-1.5 rounded-full font-medium cursor-pointer transition-colors"
                    style="color: #DC2626; background: transparent;"
                    onmouseenter="this.style.background='#FEF2F2'"
                    onmouseleave="this.style.background='transparent'">Xóa</button>
        </form>
    </div>
</div>

{% load i18n %}
{% load humanize %}
<div class="flex gap-2.5 items-start">
    <div class="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0" style="background: var(--warning-50); color: var(--warning-700);">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    </div>
    <div class="flex-1 min-w-0">
        <div class="bg-amber-50 border border-amber-200 rounded-xl rounded-tl-sm px-3.5 py-2.5">
            <div class="flex items-center gap-2 mb-1">
                <span class="text-[12px] font-semibold text-amber-900">{{ note.author.get_short_name|default:note.author.email }}</span>
                <span class="badge-pill" style="background: var(--warning-50); color: var(--warning-700); border: 1px solid rgba(234,179,8,0.2);">Internal</span>
                <span class="text-[11px] text-stone-400 ml-auto">{{ note.created_at|timesince }} ago</span>
            </div>
            <p class="text-[13px] text-amber-900 leading-relaxed whitespace-pre-wrap">{{ note.body }}</p>
        </div>
    </div>
</div>

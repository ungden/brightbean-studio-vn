<!-- Saved reply create/edit form partial -->
{% load i18n %}
<div class="max-w-lg">
    <form method="post">
        {% csrf_token %}
        <div class="space-y-4">
            <div>
                <label for="id_title" class="block text-[13px] font-semibold text-stone-700 mb-1">Tiêu đề</label>
                {{ form.title }}
            </div>
            <div>
                <label for="id_body" class="block text-[13px] font-semibold text-stone-700 mb-1">Reply Body</label>
                {{ form.body }}
                <p class="text-[11px] text-stone-400 mt-1">Variables: <code>{sender_name}</code>, <code>{account_name}</code>, <code>{post_url}</code></p>
            </div>
        </div>
        <div class="flex items-center gap-3 mt-6">
            <button type="submit"
                    class="inline-flex items-center gap-1.5 px-5 py-2 text-[13px] font-semibold text-white rounded-full transition-all duration-150 cursor-pointer"
                    style="background: var(--primary); box-shadow: var(--shadow-primary);">
                {% if saved_reply %}Update{% else %}Create{% endif %} Reply
            </button>
            <a href="{% url 'inbox:saved_replies' workspace_id=workspace.id %}"
               class="text-[13px] font-medium text-stone-500 hover:text-stone-700 transition-colors">Hủy</a>
        </div>
    </form>
</div>

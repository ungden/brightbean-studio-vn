{% load i18n %}
<div class="kanban-column" data-group-id="{{ col.id }}"
     draggable="true"
     @dragstart="startColumnDrag($event, '{{ col.id }}')"
     @dragend="endColumnDrag($event)"
     @dragover.prevent="columnDragOver($event)"
     @dragleave="columnDragLeave($event)"
     @drop="dropColumn($event, '{{ col.id }}')">
    <div class="flex items-center justify-between px-3 py-2.5 column-header" style="cursor: grab;"
         @mousedown="columnHeaderMouseDown()">
        <div class="flex items-center gap-2">
            <span class="group-label text-[13px] font-bold text-stone-800">{{ col.label }}</span>
            <span class="column-count inline-flex items-center justify-center min-w-[20px] h-5 px-1.5 rounded-full text-[11px] font-semibold bg-stone-200/70 text-stone-500">{{ col.ideas|length }}</span>
        </div>
        <div class="flex items-center gap-0.5">
            <button @click="showCreateModal = true; createGroupId = '{{ col.id }}'; createSelectedGroup = '{{ col.id }}'"
                    class="w-6 h-6 rounded-md text-stone-500 hover:text-stone-600 hover:bg-white/80 flex items-center justify-center transition-colors cursor-pointer"
                    title="Add idea">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <div class="relative" x-data="{ menuOpen: false }">
                <button @click="menuOpen = !menuOpen"
                        class="w-6 h-6 rounded-md text-stone-500 hover:text-stone-600 hover:bg-white/80 flex items-center justify-center transition-colors cursor-pointer">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="6" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="18" r="1.5"/></svg>
                </button>
                <div x-show="menuOpen" @click.away="menuOpen = false" x-cloak
                     x-transition:enter="transition ease-out duration-100"
                     x-transition:enter-start="opacity-0 scale-95"
                     x-transition:enter-end="opacity-100 scale-100"
                     class="absolute right-0 top-full mt-1 bg-white rounded-lg shadow-lg ring-1 ring-stone-200 py-1 z-50 min-w-[140px]">
                    {% if col.ideas|length == 0 %}
                    <button @click="menuOpen = false; deleteGroup('{{ col.id }}')"
                            class="w-full text-left px-3 py-1.5 text-xs font-medium text-red-600 hover:bg-red-50 transition-colors">
                        Delete column
                    </button>
                    {% else %}
                    <span class="block px-3 py-1.5 text-xs text-stone-400">
                        Remove all ideas first
                    </span>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>

    <div class="kanban-cards"
         @dragover.prevent="dragOver($event)"
         @dragleave="dragLeave($event)"
         @drop="dropOnColumn($event, '{{ col.id }}')">
        {% for idea in col.ideas %}
            {% include "composer/partials/idea_card.html" with idea=idea group_id=col.id %}
        {% endfor %}
    </div>

    <button @click="showCreateModal = true; createGroupId = '{{ col.id }}'; createSelectedGroup = '{{ col.id }}'"
            class="new-idea-inline">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Idea
    </button>
</div>

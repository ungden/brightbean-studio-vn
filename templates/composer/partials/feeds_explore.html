<!-- Explore Feeds modal interior -->
{% load i18n %}
<div class="p-6">
    <h2 class="text-lg font-semibold text-stone-800 text-center mb-5">Explore Feeds</h2>

    <!-- Category tabs -->
    <div class="flex items-center justify-center gap-2 flex-wrap mb-6">
        {% for cat in categories %}
        <button hx-get="{% url 'composer:feed_explore' workspace_id=workspace.id %}?category={{ cat.slug }}"
                hx-target="#explore-feeds-content"
                hx-swap="innerHTML"
                class="px-3 py-1.5 text-xs font-semibold rounded-full border transition-all duration-150 cursor-pointer
                       {% if cat.slug == active_category %}
                       text-stone-800 bg-green-50 border-green-200
                       {% else %}
                       text-stone-500 bg-white border-stone-200 hover:bg-stone-50
                       {% endif %}">
            {{ cat.label }}
        </button>
        {% endfor %}
    </div>

    <!-- Feed grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[400px] overflow-y-auto">
        {% for feed in curated_feeds %}
        <div class="flex items-center gap-3 px-4 py-3 border border-stone-200 rounded-xl">
            <!-- Feed icon -->
            <div class="w-10 h-10 rounded-full bg-stone-100 flex items-center justify-center flex-shrink-0">
                {% if feed.favicon %}
                <img src="{{ feed.favicon }}"
                     alt=""
                     loading="lazy"
                     class="w-5 h-5 rounded object-contain"
                     onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');">
                {% endif %}
                <svg class="w-4 h-4 text-stone-400 {% if feed.favicon %}hidden{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 019 9"/><path d="M4 4a16 16 0 0116 16"/><circle cx="5" cy="19" r="1"/></svg>
            </div>

            <!-- Feed info -->
            <div class="flex-1 min-w-0">
                <div class="text-sm font-semibold text-stone-800 truncate">{{ feed.name }}</div>
                <div class="text-xs text-stone-400 truncate">{{ feed.rss }}</div>
            </div>

            <!-- Add / Already added -->
            {% if feed.subscribed %}
            <div class="flex items-center justify-center w-8 h-8 flex-shrink-0">
                <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            {% else %}
            <form class="flex-shrink-0">
                {% csrf_token %}
                <input type="hidden" name="name" value="{{ feed.name }}">
                <input type="hidden" name="rss_url" value="{{ feed.rss }}">
                <input type="hidden" name="website_url" value="{{ feed.website }}">
                <input type="hidden" name="source" value="explore">
                <input type="hidden" name="category" value="{{ active_category }}">
                <button type="submit"
                        hx-post="{% url 'composer:feed_add' workspace_id=workspace.id %}"
                        hx-target="#explore-feeds-content"
                        hx-swap="innerHTML"
                        hx-include="closest form"
                        class="flex items-center justify-center w-8 h-8 text-stone-400 hover:text-orange-500 hover:bg-orange-50 rounded-full transition-all duration-150 cursor-pointer">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                </button>
            </form>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</div>

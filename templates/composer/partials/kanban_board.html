{% load i18n %}
<div class="flex gap-4 overflow-x-auto pb-4" style="min-height: 400px;">
    {% for col in columns %}
        {% include "composer/partials/kanban_column.html" with col=col %}
    {% endfor %}

    <!-- Add new column -->
    <div class="flex-shrink-0 w-[260px]" data-new-group-tile x-data="{ adding: false, newName: '' }">
        <button x-show="!adding" @click="adding = true; $nextTick(() => $refs.groupInput.focus())"
                class="flex items-center gap-2 px-3 py-2.5 text-[13px] font-semibold text-stone-400 hover:text-stone-600 transition-colors rounded-xl hover:bg-stone-100 w-full">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Group
        </button>
        <div x-show="adding" x-cloak class="bg-stone-100 rounded-xl p-3">
            <form @submit.prevent="createGroup(newName); adding = false; newName = ''">
                <input x-ref="groupInput" x-model="newName" type="text" placeholder="Column name..."
                       @keydown.escape="adding = false; newName = ''"
                       class="w-full px-3 py-1.5 text-sm border border-stone-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-orange-200 focus:border-orange-400">
                <div class="flex items-center gap-2 mt-2">
                    <button type="submit" class="px-3 py-1 text-xs font-semibold text-white bg-orange-500 rounded-lg hover:bg-orange-600 transition-colors">Thêm</button>
                    <button type="button" @click="adding = false; newName = ''" class="px-3 py-1 text-xs font-medium text-stone-500 hover:text-stone-700 transition-colors">Hủy</button>
                </div>
            </form>
        </div>
    </div>
</div>

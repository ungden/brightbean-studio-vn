<!-- Custom Calendar Event create/edit form (loaded via HTMX into modal) -->
{% load i18n %}
<div class="p-5">
    <h3 class="text-sm font-semibold text-stone-900 mb-4">
        {% if event %}Edit Event{% else %}Add Custom Event{% endif %}
    </h3>

    <form {% if event %}
          hx-post="{% url 'calendar:event_edit' workspace_id=workspace.id event_id=event.id %}"
          {% else %}
          hx-post="{% url 'calendar:event_create' workspace_id=workspace.id %}"
          {% endif %}
          hx-swap="none"
          class="space-y-3">
        {% csrf_token %}

        <div>
            <label class="block text-xs font-semibold text-stone-700 mb-1">Tiêu đề</label>
            <input type="text" name="title"
                   value="{% if event %}{{ event.title }}{% endif %}"
                   placeholder="e.g., Product Launch, Campaign Start"
                   required
                   class="form-input w-full text-sm">
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-xs font-semibold text-stone-700 mb-1">Start Date</label>
                <input type="date" name="start_date"
                       value="{% if event %}{{ event.start_date|date:'Y-m-d' }}{% endif %}"
                       required
                       class="form-datetime">
            </div>
            <div>
                <label class="block text-xs font-semibold text-stone-700 mb-1">End Date</label>
                <input type="date" name="end_date"
                       value="{% if event %}{{ event.end_date|date:'Y-m-d' }}{% endif %}"
                       required
                       class="form-datetime">
            </div>
        </div>

        <div>
            <label class="block text-xs font-semibold text-stone-700 mb-1">Color</label>
            <div class="flex items-center gap-2">
                <input type="color" name="color"
                       value="{% if event %}{{ event.color }}{% else %}#3B82F6{% endif %}"
                       class="w-9 h-9 rounded-lg border border-stone-200 cursor-pointer p-0.5">
                <div class="flex gap-1.5"
                     x-data="{ presets: ['#3B82F6','#22C55E','#EAB308','#F97316','#EF4444','#8B5CF6','#EC4899','#14B8A6'] }">
                    <template x-for="hex in presets" :key="hex">
                        <button type="button"
                                @click="$el.closest('form').querySelector('[name=color]').value = hex"
                                class="w-6 h-6 rounded-full border-2 border-white shadow-sm hover:scale-110 transition-transform"
                                :style="'background: ' + hex"></button>
                    </template>
                </div>
            </div>
        </div>

        <div>
            <label class="block text-xs font-semibold text-stone-700 mb-1">Description (optional)</label>
            <textarea name="description" rows="2" placeholder="Notes about this event..." class="form-input w-full text-sm">{% if event %}{{ event.description }}{% endif %}</textarea>
        </div>

        <div class="flex items-center justify-between pt-2">
            {% if event %}
            <form hx-post="{% url 'calendar:event_delete' workspace_id=workspace.id event_id=event.id %}" hx-swap="none" class="inline">
                {% csrf_token %}
                <button type="submit" class="text-xs text-red-500 hover:text-red-700 font-medium" onclick="return confirm('Delete this event?')">Delete Event</button>
            </form>
            {% else %}
            <div></div>
            {% endif %}
            <div class="flex items-center gap-2">
                <button type="button" @click="showEventForm = false" class="text-sm text-stone-500 hover:text-stone-700 py-2 px-3">Hủy</button>
                <button type="submit" class="btn-brand text-sm py-2 px-4"
                        @htmx:after-request="showEventForm = false">
                    {% if event %}Save Changes{% else %}Add Event{% endif %}
                </button>
            </div>
        </div>
    </form>
</div>

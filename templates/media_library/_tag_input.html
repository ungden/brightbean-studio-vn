{% load i18n %}
{% comment %}Tag editor with autocomplete. Expects: asset, workspace{% endcomment %}

<div x-data="tagInput({{ asset.tags|safe }})" class="space-y-2">
  <!-- Current tags -->
  <div class="flex flex-wrap gap-1.5">
    <template x-for="(tag, i) in tags" :key="i">
      <span class="inline-flex items-center gap-1 px-2.5 py-1 text-xs font-medium rounded-full"
            style="background: var(--primary-soft, #FFF7ED); color: var(--brand-700, #C2410C);">
        <span x-text="tag"></span>
        {% if not asset.is_shared %}
        <button @click="removeTag(i)" type="button" class="hover:opacity-70 transition-opacity">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        {% endif %}
      </span>
    </template>
  </div>

  {% if not asset.is_shared %}
  <!-- Add tag input -->
  <div class="relative">
    <input type="text"
           x-model="inputValue"
           @keydown.enter.prevent="addTag(inputValue)"
           @keydown.comma.prevent="addTag(inputValue)"
           @keydown.backspace="inputValue === '' && removeTag(tags.length - 1)"
           @input.debounce.300ms="fetchSuggestions()"
           @click.away="suggestions = []"
           placeholder="Add tag..."
           class="w-full text-xs px-3 py-2 border rounded-lg outline-none"
           style="border-color: var(--border, #E7E5E4);"
           onfocus="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 0 0 3px var(--primary-ring)'"
           onblur="setTimeout(() => { this.style.borderColor='var(--border)'; this.style.boxShadow='none'; }, 150)">

    <!-- Autocomplete dropdown -->
    <div x-show="suggestions.length > 0" x-cloak
         class="absolute z-10 left-0 right-0 mt-1 rounded-lg border overflow-hidden"
         style="background: var(--surface-0, #FFF); border-color: var(--border, #E7E5E4); box-shadow: var(--shadow-lg);">
      <template x-for="(s, i) in suggestions" :key="i">
        <button @click="addTag(s); suggestions = []"
                class="w-full text-left px-3 py-1.5 text-xs transition-colors"
                style="color: var(--text-primary);"
                onmouseenter="this.style.background='var(--surface-1)'"
                onmouseleave="this.style.background='transparent'"
                x-text="s"></button>
      </template>
    </div>
  </div>
  {% endif %}
</div>

<script nonce="{{ request.csp_nonce }}">
function tagInput(initialTags) {
  return {
    tags: initialTags || [],
    inputValue: '',
    suggestions: [],

    addTag(value) {
      const tag = (value || '').trim();
      if (tag && !this.tags.includes(tag)) {
        this.tags.push(tag);
        this.saveTags();
      }
      this.inputValue = '';
      this.suggestions = [];
    },

    removeTag(index) {
      if (index >= 0 && index < this.tags.length) {
        this.tags.splice(index, 1);
        this.saveTags();
      }
    },

    saveTags() {
      const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
      fetch('{% url "media_library:asset_tags" workspace_id=workspace.id asset_id=asset.id %}', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken,
        },
        body: JSON.stringify(this.tags),
      });
    },

    async fetchSuggestions() {
      if (this.inputValue.length < 1) {
        this.suggestions = [];
        return;
      }
      try {
        const resp = await fetch(
          '{% url "media_library:tag_autocomplete" workspace_id=workspace.id %}?q=' + encodeURIComponent(this.inputValue)
        );
        const data = await resp.json();
        this.suggestions = data.filter(s => !this.tags.includes(s)).slice(0, 8);
      } catch {
        this.suggestions = [];
      }
    }
  }
}
</script>

{% load i18n %}
{% comment %}Modal for creating a new folder. Expects: workspace{% endcomment %}

<div class="fixed inset-0 z-50 flex items-center justify-center" @keydown.escape.window="showNewFolder = false">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" @click="showNewFolder = false"></div>

  <!-- Modal -->
  <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-sm mx-4 p-6"
       @click.stop>
    <h3 class="text-base font-semibold mb-4" style="color: var(--text-primary, #1C1917);">New Folder</h3>

    <form hx-post="{% url 'media_library:folder_create' workspace_id=workspace.id %}"
          hx-target="#folder-tree"
          hx-swap="innerHTML"
          @htmx:after-request="showNewFolder = false">
      <input type="text" name="name" placeholder="Folder name..."
             class="w-full text-sm px-3 py-2 border rounded-lg outline-none mb-4"
             style="border-color: var(--border, #E7E5E4);"
             onfocus="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 0 0 3px var(--primary-ring)'"
             onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none'"
             required autofocus>

      <div class="flex justify-end gap-2">
        <button type="button" @click="showNewFolder = false"
                class="px-4 py-2 text-sm font-medium rounded-lg transition-colors cursor-pointer"
                style="color: var(--text-secondary, #57534E);"
                onmouseenter="this.style.background='var(--surface-2, #F5F5F4)'"
                onmouseleave="this.style.background='transparent'">Hủy</button>
        <button type="submit"
                class="px-4 py-2 text-sm font-semibold text-white rounded-lg transition-colors cursor-pointer"
                style="background: var(--primary, #F97316);"
                onmouseenter="this.style.background='var(--primary-hover, #EA580C)'"
                onmouseleave="this.style.background='var(--primary, #F97316)'">
          Create Folder
        </button>
      </div>
    </form>
  </div>
</div>

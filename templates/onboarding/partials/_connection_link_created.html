<!-- HTMX partial returned after creating a connection link -->
{% load i18n %}
<div style="
    background: var(--success-50);
    border: 1px solid rgba(34,197,94,0.15);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-bottom: 16px;
">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
        <svg width="16" height="16" fill="none" stroke="var(--success-500)" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span style="font-size: 0.875rem; font-weight: 600; color: var(--success-700);">Connection link created</span>
    </div>

    <!-- Copyable link -->
    <div style="display: flex; gap: 8px; align-items: center;" x-data="{ copied: false }">
        <input
            type="text"
            value="{{ link_url }}"
            readonly
            id="connection-link-url"
            style="
                flex: 1;
                padding: 9px 12px;
                font-size: 0.8125rem; font-family: var(--font-mono);
                border: 1.5px solid var(--border);
                border-radius: var(--radius-lg);
                background: var(--surface-0);
                color: var(--text-primary);
                outline: none;
            "
        >
        <button
            @click="navigator.clipboard.writeText('{{ link_url }}'); copied = true; setTimeout(() => copied = false, 2000)"
            style="
                padding: 9px 14px;
                font-size: 0.8125rem; font-weight: 600;
                background: var(--surface-0); color: var(--text-primary);
                border: 1px solid var(--border); border-radius: var(--radius-lg);
                cursor: pointer; white-space: nowrap;
                transition: all 150ms ease;
            "
        >
            <span x-show="!copied">Sao chép</span>
            <span x-show="copied" x-cloak style="color: var(--success-700);">Copied!</span>
        </button>
    </div>

    <p style="font-size: 0.75rem; color: var(--text-tertiary); margin-top: 8px;">
        Expires {{ link.expires_at|date:"M j, Y" }}. Share this link with your client so they can connect their social accounts.
    </p>
</div>

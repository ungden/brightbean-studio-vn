{% load i18n %}
<form hx-post="{% url 'approvals:add_comment' workspace_id=workspace.id post_id=post.id %}"
      hx-target="#comment-list-{{ post.id }}"
      hx-swap="outerHTML"
      hx-encoding="multipart/form-data"
      class="space-y-2"
      x-data="{ visibility: 'external' }">

    <textarea name="body" rows="2" required
              class="w-full px-3 py-2 text-sm border border-stone-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-300 focus:border-transparent resize-none"
              placeholder="Write a comment... Use @name to mention someone"></textarea>

    <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
            <!-- Visibility toggle -->
            <div class="flex items-center gap-1.5">
                <button type="button" @click="visibility = 'external'"
                        :class="visibility === 'external' ? 'bg-stone-900 text-white' : 'bg-stone-100 text-stone-500 hover:bg-stone-200'"
                        class="px-2.5 py-1 text-[0.6875rem] font-semibold rounded-full transition-colors">
                    Visible to Client
                </button>
                <button type="button" @click="visibility = 'internal'"
                        :class="visibility === 'internal' ? 'bg-amber-500 text-white' : 'bg-stone-100 text-stone-500 hover:bg-stone-200'"
                        class="px-2.5 py-1 text-[0.6875rem] font-semibold rounded-full transition-colors">
                    Internal Only
                </button>
            </div>
            <input type="hidden" name="visibility" :value="visibility">

            <!-- Attachment -->
            <label class="cursor-pointer text-stone-400 hover:text-stone-600 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                <input type="file" name="attachment" accept="image/*" class="hidden">
            </label>
        </div>

        <button type="submit"
                class="px-3.5 py-1.5 text-[0.8125rem] font-semibold rounded-full text-white transition-colors"
                style="background: var(--primary);">
            Comment
        </button>
    </div>
</form>

{% load i18n %}
<div id="approval-list" class="space-y-3">
    {% for post in posts %}
    {% include "approvals/partials/post_row.html" with post=post workspace=workspace %}
    {% empty %}
    <div class="text-center py-16">
        <svg class="mx-auto w-12 h-12 text-stone-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <p class="text-stone-500 font-medium">No posts pending approval</p>
        <p class="text-sm text-stone-400 mt-1">Posts submitted for review will appear here</p>
    </div>
    {% endfor %}
</div>
